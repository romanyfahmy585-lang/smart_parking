<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Parking</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#080b10;
  --surface:#0f1318;
  --card:#13181f;
  --border:#1c2530;
  --border2:#243040;
  --accent:#e8ff47;
  --green:#39d98a;
  --red:#ff4d6a;
  --text:#dde3ec;
  --muted:#4a5568;
  --mono:'DM Mono', monospace;
  --display:'Syne', sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--mono);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px 16px 40px;
  overflow-x:hidden;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:99;
  opacity:.6;
}

.wrapper{
  max-width:500px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:24px 0 8px;
  border-bottom:1px solid var(--border);
  margin-bottom:4px;
}

.header-left h1{
  font-family:var(--display);
  font-size:28px;
  font-weight:800;
  letter-spacing:-1px;
  color:#fff;
  line-height:1;
}

.header-left p{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.status-badge{
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(57,217,138,.07);
  border:1px solid rgba(57,217,138,.2);
  border-radius:20px;
  padding:6px 12px;
  font-size:11px;
  color:var(--green);
  letter-spacing:.05em;
  text-transform:uppercase;
}

.live-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:blink 1.4s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:.2;}
}

.bento{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 16px;
  transition:.25s;
}

.card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
}

.card-label{
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.card-value{
  font-family:var(--display);
  font-size:42px;
  font-weight:800;
  line-height:1;
  letter-spacing:-2px;
}

.card-sub{
  font-size:10px;
  color:var(--muted);
  margin-top:6px;
}

.card-available .card-value{
  color:var(--green);
}

.card-occupied .card-value{
  color:var(--red);
}

.card-total .card-value{
  color:var(--text);
}

.card-slots{
  grid-column:1/4;
}

.card-footer{
  grid-column:1/4;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
}

.footer-left{
  font-size:10px;
  color:var(--muted);
}

.footer-left span{
  color:var(--accent);
}

.update-time{
  font-size:10px;
  color:var(--muted);
}

.slots-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.slots-label{
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}

.refresh-btn{
  background:none;
  border:1px solid var(--border2);
  color:var(--muted);
  padding:4px 10px;
  border-radius:6px;
  font-size:10px;
  cursor:pointer;
  transition:.2s;
}

.refresh-btn:hover{
  color:var(--accent);
  border-color:var(--accent);
}

.slots-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.slot{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px 10px;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition:.25s;
}

.slot:hover{
  transform:translateY(-4px) scale(1.03);
}

.slot::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
}

.slot.free{
  border-color:rgba(57,217,138,.25);
}

.slot.free::before{
  background:var(--green);
}

.slot.occupied{
  border-color:rgba(255,77,106,.25);
}

.slot.occupied::before{
  background:var(--red);
}

.slot-num{
  font-family:var(--display);
  font-size:24px;
  font-weight:800;
  letter-spacing:-1px;
  margin-bottom:4px;
}

.slot.free .slot-num{
  color:var(--green);
}

.slot.occupied .slot-num{
  color:var(--red);
}

.slot-tag{
  font-size:9px;
  letter-spacing:.1em;
  text-transform:uppercase;
}

.slot.free .slot-tag{
  color:rgba(57,217,138,.6);
}

.slot.occupied .slot-tag{
  color:rgba(255,77,106,.6);
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div class="header-left">
      <h1>PARKING<br>MONITOR</h1>
      <p>Real-time slot status</p>
    </div>

    <div class="status-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </div>

  <div class="bento">

    <div class="card card-available">
      <div class="card-label">Available</div>
      <div class="card-value" id="free-count">0</div>
      <div class="card-sub">slots free</div>
    </div>

    <div class="card card-occupied">
      <div class="card-label">Occupied</div>
      <div class="card-value" id="occ-count">0</div>
      <div class="card-sub">slots taken</div>
    </div>

    <div class="card card-total">
      <div class="card-label">Total</div>
      <div class="card-value">6</div>
      <div class="card-sub">capacity</div>
    </div>

    <div class="card card-slots">

      <div class="slots-header">
        <div class="slots-label">Slot Status</div>

        <button class="refresh-btn" onclick="fetchStatus()">
          ↻ Refresh
        </button>
      </div>

      <div class="slots-grid" id="slots-grid"></div>

    </div>

    <div class="card card-footer">
      <div class="footer-left">
        Smart Parking · <span>ESP32 + Arduino</span>
      </div>

      <div class="update-time" id="update-time">
        --
      </div>
    </div>

  </div>

</div>

<script>

async function fetchStatus(){

  try{

    const res = await fetch('/status');
    const data = await res.json();

    const grid = document.getElementById('slots-grid');

    grid.innerHTML = '';

    let free = data.available;
    let occ  = data.occupied;

    data.slots.forEach(slot => {

      const isFree = slot.status === 'free';

      grid.innerHTML += `
      <div class="slot ${isFree ? 'free' : 'occupied'}">

        <div class="slot-num">
          ${slot.number}
        </div>

        <div class="slot-tag">
          ${isFree ? 'Free' : 'Taken'}
        </div>

      </div>
      `;
    });

    document.getElementById('free-count').textContent = free;
    document.getElementById('occ-count').textContent  = occ;

    const now = new Date();

    document.getElementById('update-time').textContent =
      "Updated " +
      now.getHours().toString().padStart(2,'0') + ":" +
      now.getMinutes().toString().padStart(2,'0') + ":" +
      now.getSeconds().toString().padStart(2,'0');

  }

  catch(e){
    console.log(e);
  }
}

fetchStatus();

setInterval(fetchStatus, 2000);

</script>

</body>
</html>
